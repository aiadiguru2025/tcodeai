name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature! Please describe your idea below.

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this feature solve? What's currently hard or impossible to do?
      placeholder: I often need to find T-codes by SAP module area but the module browser doesn't support filtering by sub-module...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe your ideal solution. How would this feature work?
      placeholder: Add a sub-module filter dropdown to the module browser page...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered any alternative solutions or workarounds?

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      options:
        - Search
        - UI/UX
        - API
        - Database
        - Performance
        - Documentation
        - Other

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Any other context, screenshots, or mockups.
